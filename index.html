<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>HTML Weather Dashboard</title>
  </head>
  <body>
    <div class="app">
      <div class="card is-night">
        <button class="add-remove-card">
          <span class="toggle-icon">+</span>
        </button>
        <input
          type="text"
          placeholder=" Search for a City"
          class="search-bar"
        />
        <p class="add-city add-city--visible">Add a City</p>

        <div class="weather-info weather-info--hidden">
          <p class="city">City</p>
          <div class="svg-temp">
            <img
              src="weather/drizzle.svg"
              alt="weather-group"
              class="weather-group-svg"
            />
            <p class="display-temp">31 <span>&deg;C</span></p>
          </div>
          <p class="description">Raining</p>

          <div class="time-date">
            <p class="time">01:13 am</p>
            <p class="date">01/06/2026</p>
          </div>
          <p class="day-night">Night</p>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
    <script src="config.js"></script>
  </body>
</html>
